<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Handball Tagger Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; padding: 8px; margin: 0; box-sizing: border-box; }
        
        /* Cabecera */
        .header-container { display: grid; grid-template-columns: 1fr 1fr; align-items: center; background: #1e1e1e; padding: 10px; border-radius: 6px; border: 1px solid #333; margin-bottom: 12px; }
        .score-box { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.2em; font-weight: bold; }
        .team-input { width: 80px; background: #2c2c2c; border: 1px solid #555; color: white; padding: 4px; font-size: 1em; text-align: center; border-radius: 4px; }
        
        /* Layout a 2 columnas para el iPad en el regazo */
        .main-layout { display: grid; grid-template-columns: 55% 45%; gap: 15px; }
        
        /* Columna Izquierda: Controles */
        .timer-box { background: #1e1e1e; padding: 10px; border-radius: 6px; border: 1px solid #2d2d2d; text-align: center; margin-bottom: 10px; }
        #timer { font-family: monospace; font-size: 2em; color: #00e676; margin-bottom: 8px; }
        
        .group { background: #1e1e1e; padding: 6px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #2d2d2d; }
        .group-label { font-size: 0.65em; color: #9e9e9e; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; padding-left: 2px; }
        .row { display: flex; gap: 4px; }
        
        /* Estilos base de botones */
        button { padding: 10px 6px; border: 1px solid #444; border-radius: 4px; background: #2c2c2c; color: #ccc; font-size: 0.85em; font-weight: bold; flex: 1; cursor: pointer; transition: all 0.1s; }
        
        /* Codificación de Colores por Categoría */
        /* Default Active */
        button.active { background: #ff9800; color: #000; border-color: #ff9800; }
        /* Equipos */
        #Eq-LOC.active { background: #1565c0 !important; color: #fff !important; border-color: #1976d2 !important; }
        #Eq-VIS.active { background: #c62828 !important; color: #fff !important; border-color: #d32f2f !important; }
        /* Resultados */
        #Res-Gol.active { background: #2e7d32 !important; color: #fff !important; border-color: #388e3c !important; }
        #Res-NoGol.active { background: #d84315 !important; color: #fff !important; border-color: #e64a19 !important; }
        
        /* Botones de acción grandes */
        .action-row { display: flex; gap: 8px; margin-top: 15px; }
        .btn-registrar { flex: 3; background: #2e7d32; color: white; padding: 15px; font-size: 1.1em; border: none; border-radius: 6px; }
        .btn-registrar:active { background: #1b5e20; }
        .btn-limpiar { flex: 1; background: #424242; color: white; border: none; border-radius: 6px; }

        /* Columna Derecha: Canvases apilados */
        .canvas-box { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1e1e1e; border: 1px solid #333; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
        canvas { width: 100%; max-width: 100%; height: auto; background: #000; border-radius: 4px; display: block; margin: 0 auto; }
        .coord-text { font-size: 0.7em; color: #aaa; margin-top: 5px; }
        
        /* Tabla con scroll y tamaño reducido para no estorbar */
        .table-container { margin-top: 15px; max-height: 150px; overflow-y: auto; border: 1px solid #333; border-radius: 6px; }
        table { width: 100%; font-size: 0.55em; border-collapse: collapse; background: #1e1e1e; }
        th, td { border: 1px solid #444; padding: 4px; text-align: center; }
        th { background: #2c2c2c; position: sticky; top: 0; }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="score-box"><input type="text" id="nameLOC" value="LOC" class="team-input" oninput="updateUI()"> : <span id="scoreLOC">0</span></div>
        <div class="score-box"><input type="text" id="nameVIS" value="VIS" class="team-input" oninput="updateUI()"> : <span id="scoreVIS">0</span></div>
    </div>

    <div class="main-layout">
        <!-- Columna Izquierda: Botonera -->
        <div>
            <div class="timer-box">
                <div id="timer">00:00:00.00</div>
                <div class="row" style="justify-content:center; gap:8px;">
                    <button onclick="controlTimer('start')">▶️ Iniciar</button>
                    <button onclick="controlTimer('pause')">⏸️ Pausa</button>
                    <button onclick="controlTimer('reset')">🔄 Cero</button>
                    <button id="btn-periodo" onclick="togglePeriodo()" style="background:#555; max-width: 60px;">1T</button>
                </div>
            </div>
            
            <div class="group"><div class="group-label">Equipo</div><div class="row"><button class="btn-tag" onclick="set('Eq','LOC')" id="Eq-LOC">LOC</button><button class="btn-tag" onclick="set('Eq','VIS')" id="Eq-VIS">VIS</button></div></div>
            <div class="group"><div class="group-label">Resultado</div><div class="row"><button class="btn-tag" onclick="set('Res','Gol')" id="Res-Gol">Gol</button><button class="btn-tag" onclick="set('Res','No Gol')" id="Res-NoGol">No Gol</button></div></div>
            <div class="group"><div class="group-label">Fase</div><div class="row"><button class="btn-tag" onclick="set('Fase','Pos')" id="Fase-Pos">Pos</button><button class="btn-tag" onclick="set('Fase','Tra')" id="Fase-Tra">Tra</button></div></div>
            <div class="group"><div class="group-label">Error</div><div class="row"><button class="btn-tag" onclick="set('Err','Par')" id="Err-Par">Par</button><button class="btn-tag" onclick="set('Err','Per')" id="Err-Per">Per</button><button class="btn-tag" onclick="set('Err','Fue')" id="Err-Fue">Fue</button></div></div>
            <div class="group"><div class="group-label">Tipo</div>
                <div class="row" style="margin-bottom: 4px;"><button class="btn-tag" onclick="set('Tipo','Lar')" id="Tipo-Lar">Lar</button><button class="btn-tag" onclick="set('Tipo','Pen')" id="Tipo-Pen">Pen</button><button class="btn-tag" onclick="set('Tipo','Ext')" id="Tipo-Ext">Ext</button></div>
                <div class="row"><button class="btn-tag" onclick="set('Tipo','Piv')" id="Tipo-Piv">Piv</button><button class="btn-tag" onclick="set('Tipo','Unf')" id="Tipo-Unf">Unf</button><button class="btn-tag" onclick="set('Tipo','Dir')" id="Tipo-Dir">Dir</button></div>
            </div>
            
            <div class="action-row">
                <button class="btn-registrar" onclick="save()">REGISTRAR JUGADA</button>
                <button class="btn-limpiar" onclick="resetAll(true)">LIMPIAR</button>
            </div>
        </div>

        <!-- Columna Derecha: Canvases -->
        <div>
            <div class="canvas-box">
                <div class="group-label">Campo (Lado)</div>
                <canvas id="cancha" width="300" height="300"></canvas>
                <div id="c-text" class="coord-text">Lado: N/A</div>
            </div>

            <div class="canvas-box">
                <div class="group-label">Portería (Zona)</div>
                <canvas id="porteria" width="300" height="150"></canvas>
                <div id="z-text" class="coord-text">Zona: N/A</div>
            </div>
        </div>
    </div>

    <!-- Tabla con logica exacta de columnas -->
    <div class="table-container">
        <table id="log">
            <thead>
                <tr>
                    <th>Equipo</th><th>Resultado</th><th>Fase</th><th>Error</th><th>Tipo</th><th>Lado</th><th>Extra</th><th>timestamp</th><th>Periodo</th><th>Coord Lado</th><th>Porteria</th><th>Coord Porteria</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <button onclick="exportCSV()" style="width:100%; margin-top:10px; background:#1565c0; padding:12px; font-size:0.9em; font-weight:bold; cursor:pointer; border:none; border-radius:6px; color:white;">EXPORTAR CSV (LISTO PARA SOFTWARE)</button>

    <script>
        let ms=0, run=false, periodo="1T";
        let score = {LOC: 0, VIS: 0}; 
        let state = {Eq:null, Res:null, Fase:'Pos', Err:null, Tipo:null, Lado:null, CX:null, CY:null, Zona:null, PX:null, PY:null};
        
        function updateUI() { 
            document.getElementById('Eq-LOC').innerText = document.getElementById('nameLOC').value; 
            document.getElementById('Eq-VIS').innerText = document.getElementById('nameVIS').value; 
        }
        function togglePeriodo() { 
            periodo = (periodo==="1T") ? "2T" : "1T"; 
            document.getElementById('btn-periodo').innerText = periodo; 
        }
        
        const pCanvas = document.getElementById('porteria');
        const cCanvas = document.getElementById('cancha');
        const pCtx = pCanvas.getContext('2d');
        const cCtx = cCanvas.getContext('2d');
        const pImg = new Image(); pImg.src = 'NS_Goal_handball.png';
        const cImg = new Image(); cImg.src = 'NS_ui_Balonmano_BL_V_T.jpg';
        
        window.onload = () => {
            pImg.onload = () => pCtx.drawImage(pImg, 0, 0, pCanvas.width, pCanvas.height);
            cImg.onload = () => cCtx.drawImage(cImg, 0, 0, cCanvas.width, cCanvas.height);
            resetAll(false); // Inicia con la UI correcta (Fase Pos activada)
        };

        cCanvas.addEventListener('click', (e) => {
            const r = cCanvas.getBoundingClientRect();
            state.CX = Math.round(((e.clientX - r.left) / r.width) * 100);
            state.CY = Math.round(((e.clientY - r.top) / r.height) * 100);
            
            state.Lado = (state.CX <= 33.33) ? "Izq" : (state.CX <= 66.66) ? "Cen" : "Der";
            document.getElementById('c-text').innerText = `Lado: ${state.Lado} (${state.CX}, ${state.CY})`;
            
            cCtx.clearRect(0,0,cCanvas.width,cCanvas.height); 
            cCtx.drawImage(cImg,0,0,cCanvas.width,cCanvas.height);
            cCtx.fillStyle = "#ff9800"; 
            cCtx.beginPath(); 
            cCtx.arc((state.CX/100)*cCanvas.width, (state.CY/100)*cCanvas.height, 8, 0, Math.PI*2); 
            cCtx.fill();
        });

        pCanvas.addEventListener('click', (e) => {
            const r = pCanvas.getBoundingClientRect();
            state.PX = Math.round(((e.clientX - r.left) / r.width) * 100);
            state.PY = Math.round(((e.clientY - r.top) / r.height) * 100);
            
            let row = (state.PY <= 33.33) ? 0 : (state.PY <= 66.66) ? 1 : 2;
            let col = (state.PX <= 33.33) ? 1 : (state.PX <= 66.66) ? 2 : 3;
            
            state.Zona = 'Z' + ((row * 3) + col);
            document.getElementById('z-text').innerText = `Zona: ${state.Zona} (${state.PX}, ${state.PY})`;
            
            pCtx.clearRect(0,0,pCanvas.width,pCanvas.height); 
            pCtx.drawImage(pImg,0,0,pCanvas.width,pCanvas.height);
            pCtx.fillStyle = "#ff9800"; 
            pCtx.beginPath(); 
            pCtx.arc((state.PX/100)*pCanvas.width, (state.PY/100)*pCanvas.height, 6, 0, Math.PI*2); 
            pCtx.fill();
        });

        function controlTimer(a) { 
            if(a=='start') run=true; 
            else if(a=='pause') run=false; 
            else {ms=0; document.getElementById('timer').innerText='00:00:00.00';} 
        }
        setInterval(() => { 
            if(run) { 
                ms++; 
                let h=Math.floor(ms/360000), m=Math.floor((ms%360000)/6000), s=Math.floor((ms%6000)/100), c=ms%100; 
                document.getElementById('timer').innerText = [h,m,s].map(v=>v.toString().padStart(2,'0')).join(':')+'.'+c.toString().padStart(2,'0'); 
            } 
        }, 10);

        function set(k, v) { 
            state[k] = (state[k] === v) ? null : v; 
            const safeV = v.replace(/\s+/g, ''); // Para que 'No Gol' coincida con 'Res-NoGol'
            
            document.querySelectorAll(`button[id^="${k}-"]`).forEach(b => {
                if (state[k] !== null && b.id === `${k}-${safeV}`) {
                    b.classList.add('active');
                } else {
                    b.classList.remove('active');
                }
            });
        }

        // Si force=true, borra el equipo. Si no, lo mantiene (Sticky Team) y resetea la fase a 'Pos'
        function resetAll(force = false) { 
            let currentEq = force ? null : state.Eq;
            state = {Eq: currentEq, Res:null, Fase:'Pos', Err:null, Tipo:null, Lado:null, CX:null, CY:null, Zona:null, PX:null, PY:null}; 
            
            document.querySelectorAll('.btn-tag').forEach(b => {
                b.classList.remove('active');
                // Reimprimir estados default
                if (b.id === 'Fase-Pos') b.classList.add('active');
                if (currentEq && b.id === `Eq-${currentEq}`) b.classList.add('active');
            }); 
            
            document.getElementById('c-text').innerText='Lado: N/A'; 
            document.getElementById('z-text').innerText='Zona: N/A'; 
            if(pImg.complete) {
                pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
                pCtx.drawImage(pImg,0,0,pCanvas.width,pCanvas.height); 
            }
            if(cImg.complete) {
                cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);
                cCtx.drawImage(cImg,0,0,cCanvas.width,cCanvas.height); 
            }
        }

        function save() { 
            const nombreEq = (state.Eq === 'LOC') ? document.getElementById('nameLOC').value : 
                             (state.Eq === 'VIS') ? document.getElementById('nameVIS').value : '';
                             
            if(state.Res === 'Gol' && state.Eq) { 
                score[state.Eq]++; 
                document.getElementById('score'+state.Eq).innerText = score[state.Eq]; 
            } 
            
            // La columna Extra va en blanco explícitamente para mantener estructura
            const row = `<tr>
                <td>${nombreEq || ''}</td>
                <td>${state.Res || ''}</td>
                <td>${state.Fase || ''}</td>
                <td>${state.Err || ''}</td>
                <td>${state.Tipo || ''}</td>
                <td>${state.Lado || ''}</td>
                <td></td> 
                <td>${document.getElementById('timer').innerText}</td>
                <td>${periodo}</td>
                <td>${state.CX !== null ? state.CX+','+state.CY : ''}</td>
                <td>${state.Zona || ''}</td>
                <td>${state.PX !== null ? state.PX+','+state.PY : ''}</td>
            </tr>`;
            
            const tbody = document.querySelector('#log tbody');
            tbody.insertAdjacentHTML('beforeend', row); 
            
            // Hacer scroll hacia abajo en la tabla automáticamente
            const tableContainer = document.querySelector('.table-container');
            tableContainer.scrollTop = tableContainer.scrollHeight;

            resetAll(false); // Falso = Mantener el equipo actual y Fase Pos
        }

        function exportCSV() { 
            let csv = "Equipo,Resultado,Fase,Error,Tipo,Lado,Extra,timestamp,Periodo,Coord Lado,Porteria,Coord Porteria\n";
            
            let locName = document.getElementById('nameLOC').value;
            let visName = document.getElementById('nameVIS').value;
            csv += `"${locName}","","","","","Local","","","","","",""\n`;
            csv += `"${visName}","","","","","Visitante","","","","","",""\n`;

            let rows = document.querySelectorAll('#log tbody tr');
            rows.forEach(row => {
                let rowData = [];
                let cols = row.querySelectorAll('td');
                cols.forEach(col => {
                    let cellData = col.innerText.replace(/"/g, '""');
                    rowData.push(`"${cellData}"`);
                });
                csv += rowData.join(",") + "\n";
            });
            
            let a = document.createElement('a'); 
            a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv); 
            a.download = 'partido_scouting.csv'; 
            a.click(); 
        }
    </script>
</body>
</html>
